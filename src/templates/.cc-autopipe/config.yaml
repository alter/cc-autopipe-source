schema_version: 1
name: CHANGEME
type: app
language: unknown
runtime:
  python: "3.11"
  node: "20"

limits:
  max_iterations: 200
  max_hours: 72
  watchdog_timeout_min: 10

termination:
  threshold: 0.85
  on_iterations: 200
  on_hours: 72

models:
  default: "claude-sonnet-4-6"
  io_worker: "claude-haiku-4-5"
  verifier: "claude-haiku-4-5"

# v1.0 (Stage L): when consecutive_failures >= trigger AND auto-escalation
# is enabled, the next cycle uses the escalate_to model + effort, with a
# reminder injected into the prompt. After a successful cycle the model
# reverts to default. Set enabled: false to opt out per project.
auto_escalation:
  enabled: true
  trigger_consecutive_failures: 3
  escalate_to: "claude-opus-4-7"
  effort: "xhigh"
  revert_after_success: true

# v1.0 (Stage N): the improver subagent reflects on a window of recent
# successful cycles and crystallises reusable patterns into
# .claude/skills/<name>/SKILL.md. The orchestrator triggers it every N
# successful cycles. Set enabled: false to opt out per project.
improver:
  enabled: true
  trigger_every_n_successes: 5

# v1.3.12 PROMOTION-TASK-PREFIX: backlog ID prefix the orchestrator uses
# to locate PROMOTION.md candidates after each cycle. Only [implement]
# tasks whose ID starts with this prefix are validated. Phase 3 sets
# this to "vec_p3_"; Phase 1 + 2 projects keep "vec_long_". A project
# with no PROMOTION-style workflow can leave it untouched (no matching
# tasks → no validation runs).
promotion:
  task_prefix: "vec_long_"

# v1.3.1 DETACH-CONFIG: defaults for cc-autopipe-detach. Resolution
# chain (highest priority first):
#   1. CLI arg               --check-every / --max-wait
#   2. Env var               CC_AUTOPIPE_DEFAULT_CHECK_EVERY /
#                            CC_AUTOPIPE_DEFAULT_MAX_WAIT
#   3. This block            detach_defaults
#   4. Hardcoded fallback    600 / 14400 (4h)
#
# Tune for your workload:
#   4h  (14400):   typical SaaS pytest+npm build (default fallback)
#   8h  (28800):   single-model ML training
#   12h (43200):   multi-period (5 OOS) ML training
#   24h (86400):   ensemble training, large models
#   48h (172800):  large-scale fine-tuning, hyperparameter search
#
# The 4h fallback is INSUFFICIENT for typical ML R&D pipelines.
# If verify.sh expects multi-stage outputs, set max_wait_sec accordingly.
detach_defaults:
  check_every_sec: 600
  max_wait_sec: 14400

paths:
  src: "."
  tests: "."
